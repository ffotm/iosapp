name: Build Unsigned iOS IPA

on:
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub UI

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        # Uses npm ci if you have a package-lock.json, otherwise falls back to npm install
        run: npm ci || npm install

      - name: Generate Native iOS Project (Expo Prebuild)
        # On a macOS runner, this command automatically runs `pod install` for you
        run: npx expo prebuild --platform ios --clean

      - name: Build App (Unsigned)
        run: |
          # Dynamically grab the workspace and scheme names generated by prebuild
          WORKSPACE=$(ls ios | grep .xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          # Run xcodebuild with code signing disabled
          xcodebuild -workspace "ios/$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into .ipa
        run: |
          mkdir Payload
          # Find the compiled .app directory in the derived data output
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -maxdepth 1 | head -n 1)
          
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # Zip the Payload directory into an .ipa file
          APP_NAME=$(basename "$APP_PATH" .app)
          zip -r "${APP_NAME}.ipa" Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-Adhan-App
          path: '*.ipa'
          retention-days: 7